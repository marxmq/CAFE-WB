<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти - Кав’ярня</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="header-container">
        <h1>Зв'яжіться з нами</h1>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="about.html">Про нас</a></li>
                <li><a href="menu.html">Меню</a></li>
                <li><strong>Контакти</strong></li>
            </ul>
        </nav>
    </header>
    <hr>
    <main style="padding: 20px; text-align: center;">
        <h2>Наші координати</h2>
        <p><b>Адреса:</b> вул. Кавова, 15, м. Вінниця</p>
        <p><b>Телефон:</b> +38 (099) 123-45-67</p>
        <p><b>Графік роботи:</b> Пн-Нд, 08:00 - 21:00</p>

        <hr>
        
        <h2>Форма зворотного зв'язку</h2>
        <p>Залиште свій відгук або побажання, і ми обов'язково його прочитаємо!</p>
        <form id="contact-form" action="#" method="post">
            <p>
                <label for="userName">Ваше ім'я:</label><br>
                <input type="text" id="userName" name="userName" placeholder="Введіть ім'я" required>
            </p>
            <p>
                <label for="userEmail">Ваш Email:</label><br>
                <input type="email" id="userEmail" name="userEmail" placeholder="example@mail.com" required>
            </p>
            <p>
                <label for="message">Повідомлення:</label><br>
                <textarea id="message" name="message" rows="5" cols="40" placeholder="Напишіть ваш відгук тут..." required></textarea>
            </p>
            <p>
                <button type="submit" class="accent-button">Відправити повідомлення</button>
                <button type="reset" class="accent-button">Очистити форму</button>
            </p>
        </form>
    </main>
</body>
</html>
